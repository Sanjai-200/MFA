<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Developer Dashboard — RBACMatrix AI</title>
<link rel="stylesheet" href="/static/css/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="dash">
  <aside class="sidebar">
    <div class="sb-head">
      <div class="sb-tag">RBACMatrix</div>
      <div class="sb-title">Dev <span>Panel</span></div>
    </div>
    <div class="sb-user">
      <div class="avatar av-developer">D</div>
      <div>
        <div class="sb-uname" id="sb-name">Developer</div>
        <div class="sb-urole role-developer">Developer</div>
      </div>
    </div>
    <nav class="sb-nav">
      <div class="nav-sec">Monitoring</div>
      <a class="nav-item active" data-s="analytics"><span class="nav-icon">📈</span>Analytics</a>
      <a class="nav-item" data-s="logs"><span class="nav-icon">📋</span>Logs (Read-only)</a>
    </nav>
    <div class="sb-foot">
      <button class="logout-btn" id="logout-btn">🚪 Sign Out</button>
    </div>
  </aside>
  <main class="main">

    <div id="s-analytics" class="section active">
      <div class="pg-head">
        <div><h1>Analytics</h1><p>System login trends and risk distribution</p></div>
        <div class="stat-card" style="padding:14px 18px;min-width:130px">
          <div class="stat-lbl">Total Events</div>
          <div class="stat-val" id="st-total">—</div>
        </div>
      </div>
      <div class="charts-grid">
        <div class="chart-card"><h3>Login Trend (Last 7 Days)</h3><canvas id="chart-trend"></canvas></div>
        <div class="chart-card"><h3>Risk Distribution</h3><canvas id="chart-risk"></canvas></div>
      </div>
    </div>

    <div id="s-logs" class="section">
      <div class="pg-head">
        <div><h1>Audit Logs</h1><p>Read-only system event log</p></div>
        <span style="font-size:12px;color:var(--muted);padding:6px 12px;background:var(--card);border-radius:6px;border:1px solid var(--border)">👁 Read-only</span>
      </div>
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>Email</th><th>Action</th><th>Risk</th><th>Status</th><th>Timestamp</th></tr></thead>
          <tbody id="logs-tbody"></tbody>
        </table>
      </div>
    </div>

  </main>
</div>
<div id="toast"></div>
<script type="module" src="/static/js/developer.js"></script>
</body>
</html>
